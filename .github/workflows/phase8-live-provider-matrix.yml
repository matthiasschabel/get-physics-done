# Phase 8 live-provider gate:
# - Runs only by explicit operator dispatch or nightly schedule.
# - Does not run on pull requests, pushes, or workflow_run events.
# - Does not use pytest as a provider launch mechanism.
# - Uploads only sanitized report artifacts.
name: Phase 8 live provider matrix

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Repository ref or reviewed commit SHA to evaluate."
        required: false
        type: string
        default: ""
      provider_set:
        description: "Comma-separated provider/runtime ids, or metadata-only."
        required: true
        type: string
        default: metadata-only
      matrix_mode:
        description: "Matrix size to request from the Phase 8 live runner."
        required: true
        type: choice
        default: smoke
        options:
          - smoke
          - targeted
          - full
      scenario_set_id:
        description: "Tracked Phase 8 scenario set identifier."
        required: true
        type: string
        default: phase8-smoke
      row_set_hash:
        description: "Expected row-set hash for the sanitized report."
        required: false
        type: string
        default: ""
      budget_id:
        description: "Operator-approved budget or ticket id for live-provider spend."
        required: true
        type: string
        default: dry-run-only
      max_attempts:
        description: "Maximum attempts per selected live row."
        required: true
        type: number
        default: 1
      max_mutating_rows:
        description: "Maximum rows allowed to perform mutating provider actions."
        required: true
        type: number
        default: 0
      dry_run:
        description: "Dry run only; records the sanitized gate contract without launching providers."
        required: true
        type: boolean
        default: true
  schedule:
    - cron: "17 8 * * *"

permissions:
  contents: read

concurrency:
  group: phase8-live-provider-matrix
  cancel-in-progress: false

jobs:
  phase8-live-provider-matrix:
    name: phase8 live provider matrix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: phase8-live-providers
    env:
      PHASE8_SOURCE_REF: ${{ github.event.inputs.source_ref || github.sha }}
      PHASE8_PROVIDER_SET: ${{ github.event.inputs.provider_set || 'metadata-only' }}
      PHASE8_MATRIX_MODE: ${{ github.event.inputs.matrix_mode || 'smoke' }}
      PHASE8_SCENARIO_SET_ID: ${{ github.event.inputs.scenario_set_id || 'phase8-smoke' }}
      PHASE8_ROW_SET_HASH: ${{ github.event.inputs.row_set_hash || '' }}
      PHASE8_BUDGET_ID: ${{ github.event.inputs.budget_id || 'nightly-dry-run-only' }}
      PHASE8_MAX_ATTEMPTS: ${{ github.event.inputs.max_attempts || '1' }}
      PHASE8_MAX_MUTATING_ROWS: ${{ github.event.inputs.max_mutating_rows || '0' }}
      PHASE8_DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
      PHASE8_SANITIZED_REPORT_DIR: phase8-sanitized-report

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.source_ref || github.sha }}
          fetch-depth: 1

      - name: Record sanitized Phase 8 gate contract
        run: |
          mkdir -p "$PHASE8_SANITIZED_REPORT_DIR"
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from datetime import UTC, datetime
          from pathlib import Path

          report_dir = Path(os.environ["PHASE8_SANITIZED_REPORT_DIR"])
          report_dir.mkdir(parents=True, exist_ok=True)
          report = {
              "schema": "phase8.live-provider-gate.sanitized-intake.v1",
              "generated_at": datetime.now(UTC).isoformat().replace("+00:00", "Z"),
              "source_ref": os.environ["PHASE8_SOURCE_REF"],
              "repo_head": subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip(),
              "provider_set": os.environ["PHASE8_PROVIDER_SET"],
              "matrix_mode": os.environ["PHASE8_MATRIX_MODE"],
              "scenario_set_id": os.environ["PHASE8_SCENARIO_SET_ID"],
              "row_set_hash": os.environ["PHASE8_ROW_SET_HASH"],
              "budget_id": os.environ["PHASE8_BUDGET_ID"],
              "max_attempts": int(os.environ["PHASE8_MAX_ATTEMPTS"]),
              "max_mutating_rows": int(os.environ["PHASE8_MAX_MUTATING_ROWS"]),
              "dry_run": os.environ["PHASE8_DRY_RUN"].lower() != "false",
              "decision": "pending",
              "retention_manifest": {
                  "entries": [
                      {
                          "artifact_ref": "phase8-provider-smoke-report.json",
                          "retention_class": "committed_redacted",
                          "material_class": "sanitized_report",
                          "safe_to_commit": True,
                      },
                      {
                          "artifact_ref": "phase8-provider-smoke-summary.md",
                          "retention_class": "committed_redacted",
                          "material_class": "sanitized_report",
                          "safe_to_commit": True,
                      },
                  ],
              },
              "provider_material_retained": False,
              "provider_launch_performed": False,
          }
          (report_dir / "phase8-provider-smoke-report.json").write_text(
              json.dumps(report, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          (report_dir / "phase8-provider-smoke-summary.md").write_text(
              "# Phase 8 Live Provider Gate\n\n"
              f"- Decision: `{report['decision']}`\n"
              f"- Dry run: `{str(report['dry_run']).lower()}`\n"
              f"- Source ref: `{report['source_ref']}`\n"
              f"- Provider set: `{report['provider_set']}`\n"
              f"- Matrix mode: `{report['matrix_mode']}`\n"
              "- Provider launch performed: `false`\n"
              "- Uploaded artifact class: `committed_redacted`\n",
              encoding="utf-8",
          )
          PY

      - name: Stop before live provider launch unless dry run
        run: |
          if [ "$PHASE8_DRY_RUN" = "false" ]; then
            echo "::error::Phase 8 live-provider launch is not wired in this skeleton. Uploading raw provider output is forbidden; implement the live runner before disabling dry_run."
            exit 1
          fi

      - name: Upload sanitized Phase 8 report
        uses: actions/upload-artifact@v7
        with:
          name: phase8-sanitized-provider-report
          path: |
            phase8-sanitized-report/phase8-provider-smoke-report.json
            phase8-sanitized-report/phase8-provider-smoke-summary.md
          if-no-files-found: error
          retention-days: 14
